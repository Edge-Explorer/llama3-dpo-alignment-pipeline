# DPO Training Configuration for Llama-3 8B
# Optimized for T4 GPU (Kaggle)

model_name: "unsloth/llama-3-8b-Instruct-bnb-4bit"
dataset_name: "Intel/orca_dpo_pairs"
max_seq_length: 768 # Reduced for VRAM (Kaggle optimization)
load_in_4bit: true

lora_config:
  r: 16
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
  lora_alpha: 16
  lora_dropout: 0
  bias: "none"
  use_gradient_checkpointing: "unsloth"

dpo_config:
  beta: 0.1
  learning_rate: 5e-6
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  optim: "paged_adamw_8bit"
  max_length: 768
  max_prompt_length: 384
  logging_steps: 1
  report_to: "wandb"
  output_dir: "outputs"
